<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Drishti Surveillance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .camera-container {
            background: black;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .camera-frame {
            width: 100%;
            height: auto;
            display: block;
        }
        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-size: 12px;
        }
        .status-online {
            background: #28a745;
        }
        .status-offline {
            background: #dc3545;
        }
        .error-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #dc3545;
            color: white;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="error-popup" id="errorPopup"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Drishti Surveillance</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showAddPersonModal()">Add Person</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="camera-container">
                    <div class="status-indicator status-offline" id="statusIndicator">
                        Connecting...
                    </div>
                    <img id="cameraFrame" class="camera-frame" src="" alt="Camera Feed">
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>System Status</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Persons Detected:</strong> <span id="personCount">0</span></p>
                        <p><strong>Known Persons:</strong> <span id="knownCount">0</span></p>
                        <p><strong>Unknown Persons:</strong> <span id="unknownCount">0</span></p>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header">
                        <h5>Recent Detections</h5>
                    </div>
                    <div class="card-body">
                        <div id="recentDetections">
                            <p class="text-muted">No recent detections</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Person Modal -->
    <div class="modal fade" id="addPersonModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Person</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPersonForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="personName" class="form-label">Name *</label>
                            <input type="text" class="form-control" id="personName" required>
                        </div>
                        <div class="mb-3">
                            <label for="personEnroll" class="form-label">Enrollment Number</label>
                            <input type="text" class="form-control" id="personEnroll">
                        </div>
                        <div class="mb-3">
                            <label for="personBranch" class="form-label">Branch</label>
                            <input type="text" class="form-control" id="personBranch">
                        </div>
                        <div class="mb-3">
                            <label for="personEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="personEmail">
                        </div>
                        <div class="mb-3">
                            <label for="personContact" class="form-label">Contact</label>
                            <input type="text" class="form-control" id="personContact">
                        </div>
                        <div class="mb-3">
                            <label for="personImage" class="form-label">Image *</label>
                            <input type="file" class="form-control" id="personImage" accept="image/*" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addPerson()">Add Person</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/camera.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>

    <script>
        function showAddPersonModal() {
            new bootstrap.Modal(document.getElementById('addPersonModal')).show();
        }

        function addPerson() {
            const formData = new FormData();
            formData.append('name', document.getElementById('personName').value);
            formData.append('enroll', document.getElementById('personEnroll').value);
            formData.append('branch', document.getElementById('personBranch').value);
            formData.append('email', document.getElementById('personEmail').value);
            formData.append('contact', document.getElementById('personContact').value);
            formData.append('image', document.getElementById('personImage').files[0]);

            fetch('/add_person', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Person added successfully!');
                    bootstrap.Modal.getInstance(document.getElementById('addPersonModal')).hide();
                    document.getElementById('addPersonForm').reset();
                } else {
                    showPopup(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showPopup('Error adding person');
            });
        }

        function logout() {
            window.location.href = '/login';
        }

        // Function to update recent detections
        function updateRecentDetections() {
            fetch('/get_recent_detections')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const detectionsDiv = document.getElementById('recentDetections');
                    if (data.data.length > 0) {
                        let html = '<ul class="list-group list-group-flush">';
                        data.data.forEach(detection => {
                            html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                                ${detection.name}
                                <small class="text-muted">${new Date(detection.timestamp).toLocaleString()}</small>
                            </li>`;
                        });
                        html += '</ul>';
                        detectionsDiv.innerHTML = html;
                    } else {
                        detectionsDiv.innerHTML = '<p class="text-muted">No recent detections</p>';
                    }
                }
            })
            .catch(error => {
                console.error('Error fetching recent detections:', error);
            });
        }

        // Update recent detections every 5 seconds
        setInterval(updateRecentDetections, 5000);

        // Initial load
        document.addEventListener('DOMContentLoaded', function() {
            updateRecentDetections();
        });
    </script>
</body>
</html>
